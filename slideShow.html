<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Show - Ahmed Elhadidy</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="javascript/main.js"></script>
  <script defer src="javascript/slider.js"></script>
  <script defer src="javascript/language.js"></script>
</head>
<body id="body">
  <header id="header" class="myheader">
    <div class="header-container">
      <a href="index.html" style="text-decoration: none;"><h1 id="tslider"></h1></a>
      <nav>
        <ul class="parent">
          <li><a href="https://github.com/AhmedElhadidy" target="_blank" id="projectsLink" data-key="projectsLink">ALL project</a></li>
          <li><a href="slideShow.html" id="sliderLink" data-key="sliderLink">Slider Show</a></li>
          <li id="dark" class="mode">Change Mode</li>
          <li id="changecolor">Change Color
            <ul id="hiddenul" style="display: none">
              <li id="headerbg">Header BG</li>
              <li id="titlebg">Title BG</li>
              <li id="titlecolor">Title color</li>
              <li id="sectionbg">section BG</li>
            </ul>
          </li>
          <li><button id="langToggle" class="mode">🇬🇧 English</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <section>
      <h1 dir="rtl" class="hed" data-key="sliderTitle">Slider - Slide Show</h1>
      <div class="sliderContainer">
        <div id="slidMain" class="slideContent"></div>
      </div>
      <div class="mainButton">
        <button id="prev">&#10094; prev</button>
        <div class="numbres">
          <button class="myNumber active-num">1</button>
          <button class="myNumber">2</button>
          <button class="myNumber">3</button>
          <button class="myNumber">4</button>
          <button class="myNumber">5</button>
        </div>
        <button id="next">next &#10095;</button>
      </div>
    </section>
  </main>

  <footer>
    <p class="follow" data-key="followText">
      يُمكنك متابعة اخر أخبار الموقع و القناة علي
      <a target="_blank" href="https://www.facebook.com/profile.php?id=100074474801379">الفيسبوك</a>
    </p>
    <p class="design">Designed and developed by Ahmed_Elhadidy © 2020</p>
  </footer>
</body>
</html>
